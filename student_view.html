<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 가치 보석 칭찬 통장</title>
    <style>
        /* [웹폰트 이중 보안] 모바일 기기 차단율 0%를 자랑하는 가장 안정적인 상용 분산 저장소 연동 */
        @font-face {
            font-family: 'HKLeeseoyun_MobileFinal';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/HKLeeseoyun.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/HKLeeseoyun.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        /* 스마트폰/태블릿 내 모든 입력/출력 텍스트에 이서윤체 강제 박기 */
        * {
            font-family: 'HKLeeseoyun_MobileFinal', '이서윤체', '흥국생명 이서윤체', sans-serif !important;
            box-sizing: border-box;
        }

        body {
            font-size: 22px; /* 모바일 가독성을 위해 기본 폰트 살짝 조정 */
            background-color: #fcf9f2;
            color: #333;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        /* 상단 제목 타이틀 색상 양식 보존 */
        h1 {
            margin-top: 20px;
            margin-bottom: 5px;
            font-size: 34px;
        }
        .name-purple { color: #9b59b6; }    
        .value-default { color: #ff6b76; }  
        .bank-blue { color: #3498db; }      

        .summary-box {
            font-size: 23px;
            color: #000000; 
            font-weight: bold;
            margin-bottom: 25px;
            padding: 0 10px;
            line-height: 1.4;
        }

        /* ==========================================================================
           [핵심] 반응형 화면 분할 시스템 (기본값: PC/태블릿 모니터용 좌우 분할)
           ========================================================================== */
        .student-main-layout {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: left;
        }

        /* [좌측] 가치 보석함 기본 프레임 (핑크 테두리) */
        .left-jewel-board {
            flex: 0 0 65%;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 3px dashed #ff8b94; 
        }

        /* 가로 10개 정렬 보드판 */
        .bank-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); 
            gap: 8px; 
        }

        .bank-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
        }
        
        .bank-circle {
            width: 48px;
            height: 48px;
            border-radius: 50% !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .bank-slot:hover .bank-circle { transform: scale(1.1); }
        .bank-label { font-size: 13px; margin-top: 5px; font-weight: bold; color: #444; text-align: center; }
        .bank-date { font-size: 10px; color: #888; margin-top: 1px; }

        /* [우측] 가치 배지함 기본 프레임 (딥그린 테두리) */
        .right-badge-board {
            flex: 0 0 35%;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 3px dashed #117a65;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .badge-title-header {
            margin: 0 0 15px 0; 
            color:#117a65; 
            font-size:24px;
            border-bottom: 2px solid #a3e4d7;
            padding-bottom: 8px;
            width: 100%;
        }

        .badge-item {
            background-color: #e8f8f5;
            border: 2px solid #a3e4d7;
            color: #117a65;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 19px;
            margin-bottom: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ==========================================================================
           [★치트키] 스마트폰/세로형 모바일 기기 감지 시 디자인 자동 변환 스위치
           ========================================================================== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            h1 {
                font-size: 28px; /* 스마트폰 전용 제목 크기 축소 */
            }
            .summary-box {
                font-size: 20px;
                margin-bottom: 15px;
            }
            /* 좌우 분할 구조를 위아래(상하) 구조로 마법처럼 변경 */
            .student-main-layout {
                flex-direction: column;
                gap: 15px;
            }
            /* 보석함과 배지함이 가로 100%를 다 쓰도록 확장 */
            .left-jewel-board, .right-badge-board {
                flex: 0 0 100%;
                width: 100%;
                padding: 15px;
            }
            /* 핸드폰 화면에 맞게 동그라미 보석 알갱이 크기를 조밀하게 자동 조절 */
            .bank-circle {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
            .bank-label {
                font-size: 10px;
            }
            .bank-date {
                font-size: 8px;
                display: none; /* 핸드폰 화면이 너무 좁을 땐 날짜를 숨겨 보석 정렬을 살립니다 (클릭하면 팝업으로 나옴) */
            }
            .badge-title-header {
                font-size: 20px;
            }
            .badge-item {
                font-size: 17px;
                padding: 8px 12px;
            }
        }

        /* 팝업 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .modal-circle {
            width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 34px; margin: 0 auto 15px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .modal-info-card {
            font-size: 19px; margin: 15px 0; color: #444; text-align: left; background: #fdfbfc; padding: 12px; border: 1px solid #eee; border-radius: 10px; line-height: 1.5;
        }
        .close-btn {
            background-color: #ff8b94; color: white; border: none; padding: 12px 30px; font-size: 21px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%;
        }
    </style>
</head>
<body>

    <h1 id="headlineTitle">
        ✨ <span id="studentName" class="name-purple">나</span>의 
        <span class="value-default">가치 보석💎</span> 
        <span class="bank-blue">칭찬 통장</span> ✨
    </h1>
    <div class="summary-box" id="summaryCounter">가치 보석함을 불러오는 중입니다...</div>

    <div class="student-main-layout">
        
        <div class="left-jewel-board">
            <div class="bank-grid" id="studentBankGrid"></div>
        </div>

        <div class="right-badge-board">
            <h3 class="badge-title-header">🏅 나의 가치 배지함</h3>
            <div id="badgeGridZone" style="width:100%;"></div>
        </div>

    </div>

    <div class="modal-overlay" id="studentDetailModal">
        <div class="modal-content">
            <div class="modal-circle" id="mCircle"></div>
            <h2 id="mTitle" style="margin: 0 0 10px 0; font-size:24px;">보석 상세 내역</h2>
            
            <div class="modal-info-card">
                <strong>📅 받은 날짜:</strong> <span id="mDate" style="color:#666;"></span><br>
                <strong style="display:inline-block; margin-top:8px;">📝 선생님의 칭찬 말씀:</strong><br>
                <span id="mReason" style="color: #ff6b76; font-weight: bold;"></span>
            </div>
            <button class="close-btn" onclick="closeStudentModal()">닫기</button>
        </div>
    </div>

    <script>
        let studentData = null;

        function loadCurrentStudentProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = parseInt(urlParams.get('id')) || 1; 

            const savedDb = localStorage.getItem('highfive_praise_system_v5');
            if (savedDb) {
                const parsed = JSON.parse(savedDb);
                studentData = parsed.students.find(s => s.id === studentId);
            }

            if (!studentData) {
                const studentNamesList = [
                    "강채원", "구강민", "권지윤", "김규민", "김단우", "김시율", "김은호", "노규비", 
                    "문채민", "박서우", "박세담", "백주은", "손현우", "신채현", "심하준", "윤강현", 
                    "이루나", "이루아", "전은지", "정유나", "정재이", "정하늘", "조우성", "진주완", 
                    "최혜린", "하재율", "하태준", "황정원"
                ];
                const currentName = studentNamesList[studentId - 1] || "기쁨이";

                studentData = {
                    id: studentId,
                    name: currentName,
                    inventory: [], 
                    badges: []     
                };
            }

            renderStudentInterface();
        }

        function renderStudentInterface() {
            document.getElementById('studentName').innerText = studentData.name;
            document.getElementById('summaryCounter').innerText = `내가 차곡차곡 모은 소중한 가치 보석은 총 [ ${studentData.inventory.length}개 ] 입니다! 🎉`;

            const grid = document.getElementById('studentBankGrid');
            grid.innerHTML = '';

            studentData.inventory.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'bank-slot';
                slot.onclick = () => openStudentModal(item);
                slot.innerHTML = `
                    <div class="bank-circle" style="background-color: ${item.color};">${item.icon}</div>
                    <div class="bank-label">${item.name}</div>
                    <div class="bank-date">${item.date}</div>
                `;
                grid.appendChild(slot);
            });

            const emptyCount = Math.max(0, 10 - studentData.inventory.length);
            for(let i=0; i<emptyCount; i++) {
                grid.innerHTML += `<div class="bank-slot"><div class="bank-circle" style="background: #f4f4f4; box-shadow:none;"></div></div>`;
            }

            const bZone = document.getElementById('badgeGridZone');
            bZone.innerHTML = '';
            if (studentData.badges.length === 0) {
                bZone.innerHTML = `<p style="font-size:16px; color:#aaa; text-align:center; font-style:italic; padding-top:10px;">보석을 더 많이 모으면 멋진 배지가 여기에 나타나요!</p>`;
            } else {
                studentData.badges.forEach(b => {
                    bZone.innerHTML += `<div class="badge-item">🏅 ${b.name}<span style="font-size:13px; color:#666; margin-top:3px;">(${b.date} 획득)</span></div>`;
                });
            }
        }

        function openStudentModal(item) {
            const circle = document.getElementById('mCircle');
            circle.innerText = item.icon; circle.style.backgroundColor = item.color;
            document.getElementById('mTitle').innerText = `[${item.name}] 가치 보석 상세`;
            document.getElementById('mDate').innerText = item.date;
            document.getElementById('mReason').innerText = item.reason;
            document.getElementById('studentDetailModal').style.display = 'flex';
        }

        function closeStudentModal() { document.getElementById('studentDetailModal').style.display = 'none'; }

        loadCurrentStudentProfile();
    </script>
</body>
</html>
